<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <style>
            .isFalse { background-color: red; color: white; }
            .isTrue { background-color: green; color: white; }
        </style>
        <script>
            // TODO: Add code to check answers to questions
        function changeColor(button, isCorrect) {
            if (isCorrect){
                button.classList.add("isTrue");
            } else {
                button.classList.add("isFalse");
            }
        }
        function checkAnswer(){
            let correctAnswer = ["2", "two"];
            let userInput = document.getElementById("userInput").value.trim().toLowerCase();
            if (correctAnswer.includes(userInput)) {
                document.getElementById("result2").innerText = "Good answer!";
            } else {
                document.getElementById("result2").innerText = "Bad answer. Try again!";
            }
        }

        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                 <h3>
                 Do you like cats?
                </h3>
                 <h3>
                    <button onclick="changeColor(this, true)">Yes</button>
                    <button onclick="changeColor(this, false)">Meh</button>
                    <button onclick="changeColor(this, false)">No</button>
                    <p id="result1"></p>
                </h3>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>
                    How many cats do I have? (FYI they are named Venus and Milo! And yeah, I'm bad at questions.)
                </h3>
                <input type="text" id="userInput" placeholder="Enter something">
                <button onclick="checkAnswer()">Check answer</button>
                <p id="result2"></p>
            </div>
        </div>
    </body>
</html>
