{% extends "layout.html" %}

{% block title %}

    Stock quote:

{% block main %}

    <h2>Stock Quote</h2>
    <p></p>
    <p><strong>Company:</strong> {{ quote["name"] }}</p>

    <p><strong>Price:</strong> {{ quote["price"] | usd }}</p>
    <p></p>
    <a href="/quote" class="btn btn-primary">Get Another Quote</a>

{% endblock %}
