{% extends "layout.html" %}

{% block title %}

    Quote Stock:

{% endblock %}

{% block main %}

    <h2>Please enter stock symbol to get a quote:</h2>
    <p></p>
    <form action="/quote" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Stock Symbol (e.g., AAPL)" type="text">
        </div>
        <button class="btn btn-primary" type="submit">Get Quote</button>
    </form>

{% endblock %}
