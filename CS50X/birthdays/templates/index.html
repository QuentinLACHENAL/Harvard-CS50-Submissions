<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="/static/styles.css" rel="stylesheet">
        <title>Birthdays</title>
    </head>
    <body>
        <div class="header">
            <h1>Birthdays</h1>
        </div>
        <div class="container">
            <div class="section">

                <h2>Add a Birthday</h2>
                <!-- TODO: Create a form for users to submit a name, a month, and a day -->
                 <form action="/" method="POST">
                    <label for="name"> Your name is:</label>
                    <input type="text" id="name" name="name" required>
                    <p></p>
                    <label for="day"> You birthday day is (number):</label>
                    <input type="text" id="day" name="day" min="1" max="31" required>
                    <p></p>
                    <label for="birthday"> Your birthday month is (number):</label>
                    <input type="text" id="month" name="month" min="1" max="12"required>
                    <button type ="submit">Submit</button>
                 </form>
                 <!-- end of my code -->
            </div>

            <div class="section">

                <h2>All Birthdays</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Birthday</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- TODO: Loop through the database entries to display them in this table -->
                        {% for birthday in birthdays %}
                        <tr>
                            <td>{{ birthday.name }}</td>
                            <td>{{ birthday.day }}</td>
                            <td>{{ birthday.month }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </body>
</html>
